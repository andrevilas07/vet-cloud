name: Build and deploy to Azure Web App (Container)

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    needs: read_deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-buildx-action@v2

      - name: Login to Azure Container Registry using OIDC
        uses: azure/docker-login@v1
        with:
          login-server: ${{ fromJson(needs.read_deploy.outputs.deploy).acrLogin }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ fromJson(needs.read_deploy.outputs.deploy).acrLogin }}/vet-cloud:latest

      - name: Deploy to Azure Web App (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ fromJson(needs.read_deploy.outputs.deploy).appName }}
          images: ${{ fromJson(needs.read_deploy.outputs.deploy).acrLogin }}/vet-cloud:latest

  read_deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.read.outputs.json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read deploy info
        id: read
        run: |
          # Ensure the file exists and fail early with a helpful message
          if [ ! -f .deploy_info.json ]; then
            echo "::error file=.deploy_info.json::.deploy_info.json not found in repository. Make sure the file is committed to the branch triggering this workflow." 
            exit 1
          fi
          # Use the recommended $GITHUB_OUTPUT to set step outputs
          echo "json=$(cat .deploy_info.json)" >> $GITHUB_OUTPUT
