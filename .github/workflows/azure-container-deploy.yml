name: Build and deploy to Azure Web App (Container)

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    needs: read_deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-buildx-action@v2

      - name: 'Debug: print acr login'
        run: |
          echo "acr_login from needs: '${{ needs.read_deploy.outputs.acr_login }}'"

      - name: Login to Azure Container Registry using OIDC
        uses: azure/docker-login@v1
        with:
          login-server: ${{ needs.read_deploy.outputs.acr_login }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ needs.read_deploy.outputs.acr_login }}/vet-cloud:latest

      - name: Deploy to Azure Web App (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ fromJson(needs.read_deploy.outputs.deploy).appName }}
          images: ${{ needs.read_deploy.outputs.acr_login }}/vet-cloud:latest

  read_deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.read.outputs.json }}
      acr_login: ${{ steps.read.outputs.acr_login }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read deploy info
        id: read
        run: |
          # Ensure the file exists and fail early with a helpful message
          if [ ! -f .deploy_info.json ]; then
            echo "::error file=.deploy_info.json::.deploy_info.json not found in repository. Make sure the file is committed to the branch triggering this workflow." 
            exit 1
          fi
          # Use the recommended $GITHUB_OUTPUT to set step outputs
          # Use EOF multi-line format to safely pass JSON (avoid newlines breaking the output file format)
          echo "json<<EOF" >> $GITHUB_OUTPUT
          cat .deploy_info.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Also output a single-line value for acrLogin to avoid passing JSON blobs into action inputs
          ACR_LOGIN=$(jq -r '.acrLogin' .deploy_info.json)
          echo "acr_login=$ACR_LOGIN" >> $GITHUB_OUTPUT
